<!DOCTYPE html>
<html lang="tr">
<head>
  <!-- Sayfanın karakter setini ve responsive yapılandırmasını ayarlıyoruz -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Sayfa başlığı -->
  <title>Wizzle - Your Profile</title>

  <!-- Google ikon fontunu yüklüyoruz -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  
  <!-- Harici CSS dosyasını bağlıyoruz -->
  <link rel="stylesheet" href="css/style.css" />

</head>

<body>
  <!-- Sol taraftaki menü (sidebar) -->
  <div class="menu">
    <!-- Menü içeriği -->
    <ul class="menu-content">
      <li><a href="index.html"><span class="material-symbols-outlined">home</span><span>Ana Sayfa</span></a></li>
      <li><a href="lesson.html"><span class="material-symbols-outlined">menu_book</span><span>Dersler</span></a></li>
      <li><a href="profile.html"><span class="material-symbols-outlined">person</span><span>Profil</span></a></li>
      <li><a href="login.html"><span class="material-symbols-outlined">login</span><span>Giriş</span></a></li>
      <li><a href="signup.html"><span class="material-symbols-outlined">person_add</span><span>Kayıt Ol</span></a></li>
      <li><a href="#"><span class="material-symbols-outlined">logout</span><span>Çıkış</span></a></li>
    </ul>
  </div>

  <div class="container">
    <!-- Sayfada görsel efekt olarak sakura yaprakları ekliyoruz -->
    <div class="sakura">
      <!-- Yaprak elemanlarını oluşturuyoruz -->
      <!-- Bunların hareketi CSS ile ayarlanacak -->
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
    </div>

    <!-- Sayfa genel içeriği -->
    <div class="sayfa">
      <!-- Sayfa başlığı ve navigasyon menüsü -->
      <header>
        <h1>Wizzle</h1>
        <nav>
          <a href="index.html">Ana Sayfa</a>
          <a href="lesson.html">Dersler</a>
        </nav>
      </header>

      <!-- Profil kartını oluşturan ana yapı -->
      <div class="main-container">
        <div class="card">
          <!-- Kart başlığı, isteğe bağlı simgeler -->
          <div class="header">
            <span class="fas fa-arrow-left"></span>
            <span class="fas fa-ellipsis-v"></span>
          </div>

          <!-- Profil fotoğrafı alanı -->
          <div class="profile-img flex-c">
            <img src="avatar.png" alt="Profile Picture" style="height: 250px; width: 200px">
          </div>

          <!-- İsim ve meslek bilgisi -->
          <div class="name">John Doe</div>
          <div class="about">Full-stack Web Developer</div>

          <!-- Yıldızlı puanlama sistemi -->
          <div class="rating">
            <p class="stars">
              <span>&#x2605;</span>
              <span>&#x2605;</span>
              <span>&#x2605;</span>
              <span>&#x2605;</span>
              <span>&#x2605;</span>
            </p>
            <p class="rating-count">30.7K Ratings</p>
          </div>

          <!-- Sosyal medya ikon bağlantıları -->
          <div class="social-handles">
            <a href="#"><span class="fab fa-youtube"></span></a>
            <a href="#"><span class="fab fa-instagram"></span></a>
            <a href="#"><span class="fab fa-github"></span></a>
            <a href="#"><span class="fab fa-linkedin"></span></a>
            <a href="#"><span class="fab fa-twitter"></span></a>
          </div>

          <!-- Kullanıcıyı takip etme butonu -->
          <div class="btns">
            <button class="follow-btn">Follow</button>
          </div>

          <!-- Takipçi, yorum ve paylaşım istatistikleri -->
          <div class="footer">
            <div class="followers">
              <span class="fas fa-user"></span>
              <span class="follow-count">92K</span>
            </div>
            <div class="comments">
              <span class="fas fa-comment"></span>
              <span class="comment-count">420K</span>
            </div>
            <div class="shares">
              <span class="fas fa-share"></span>
              <span class="share-count">57K</span>
            </div>

          </div>

        </div>
      </div>


      <!-- Alt bilgi (footer) kısmı -->
      <footer>
        <p>&copy; 2025 Wizzle</p>
      </footer>
    </div>


</body>

</html>
